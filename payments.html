<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagos — GYM AESTHETICS FITNESS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="js/styles.css">
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando pagos...</div>
</div>

<div class="app-layout" id="app" style="display:none">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-sq">GA</div>
      <div class="logo-info">
        <div class="logo-name">Gym Aesthetics</div>
        <div class="logo-sub">Fitness</div>
      </div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Principal</div>
      <a href="dashboard.html" class="nav-link"><span class="nav-icon">◈</span><span>Dashboard</span></a>
      <a href="members.html" class="nav-link"><span class="nav-icon">◉</span><span>Socios</span></a>
      <a href="payments.html" class="nav-link active"><span class="nav-icon">◎</span><span>Pagos</span></a>
      <div class="nav-label owner-only">Administración</div>
      <a href="reports.html" class="nav-link owner-only"><span class="nav-icon">▦</span><span>Reportes</span></a>
      <a href="settings.html" class="nav-link owner-only"><span class="nav-icon">◧</span><span>Configuración</span></a>
    </nav>
    <div class="sidebar-user">
      <div class="user-card">
        <div class="user-avatar" id="user-avatar">??</div>
        <div class="user-info">
          <div class="user-name" id="user-name">...</div>
          <div class="user-role-badge" id="user-role">...</div>
        </div>
        <button class="btn-logout" onclick="logout()" title="Cerrar sesión">⏻</button>
      </div>
    </div>
  </aside>

  <header class="app-header">
    <div class="page-title">PAGOS</div>
    <div class="header-actions">
      <button class="btn btn-accent" id="btn-new-payment">+ Registrar Pago</button>
    </div>
  </header>

  <main class="app-main">
    <div class="card">
      <div class="section-header" style="margin-bottom:16px">
        <div class="section-title">HISTORIAL DE PAGOS</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div class="search-bar" style="width:200px">
            <span class="search-icon">⌕</span>
            <input type="text" id="search-input" placeholder="Buscar socio...">
          </div>
          <select id="filter-month" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:10px 12px;outline:none">
            <option value="">Todos los meses</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Socio</th>
              <th>Plan</th>
              <th>Método</th>
              <th>Monto</th>
              <th>Vigencia</th>
            </tr>
          </thead>
          <tbody id="payments-tbody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL PAGO -->
<div id="payment-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3>REGISTRAR PAGO</h3>
      <button class="modal-close" onclick="closePaymentModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field" style="grid-column:1/-1">
          <label>Socio *</label>
          <select id="pay-member">
            <option value="">Seleccionar socio...</option>
          </select>
        </div>
        <div class="field">
          <label>Plan</label>
          <select id="pay-plan">
            <option value="">Seleccionar plan...</option>
          </select>
        </div>
        <div class="field">
          <label>Monto (Bs) *</label>
          <input type="number" id="pay-amount" placeholder="0.00" step="0.01">
        </div>
        <div class="field">
          <label>Método de pago *</label>
          <select id="pay-method">
            <option value="cash">Efectivo</option>
            <option value="qr_transfer">QR / Transferencia</option>
          </select>
        </div>
        <div class="field">
          <label>Fecha de pago *</label>
          <input type="date" id="pay-date">
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Notas</label>
          <input type="text" id="pay-notes" placeholder="Observaciones opcionales">
        </div>
      </div>
      <div id="pay-preview" style="display:none;margin-top:20px;padding:14px;background:rgba(212,245,60,0.05);border:1px solid rgba(212,245,60,0.15)">
        <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Resumen de membresía</div>
        <div style="font-size:13px;color:var(--text2)">Inicio: <span id="prev-start" style="color:var(--text)"></span></div>
        <div style="font-size:13px;color:var(--text2)">Vencimiento: <span id="prev-end" style="color:var(--accent)"></span></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePaymentModal()">Cancelar</button>
      <button class="btn btn-accent" id="btn-save-payment">Registrar Pago</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
let allPayments = [];
let members = [];
let plans = [];

(async () => {
  const session = await requireAuth();
  if (!session) return;
  await setupNav();

  const name = document.getElementById('user-name').textContent;
  const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;

  members = await loadMembers();
  plans = await getPlans();
  fillMonthFilter();
  fillPaymentSelects();
  await loadPayments();

  // Check URL params (coming from members page)
  const params = new URLSearchParams(window.location.search);
  if (params.get('member_id')) {
    openPaymentModal(params.get('member_id'));
  }

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'grid';

  document.getElementById('btn-new-payment').addEventListener('click', () => openPaymentModal());
  document.getElementById('btn-save-payment').addEventListener('click', savePayment);
  document.getElementById('search-input').addEventListener('input', filterPayments);
  document.getElementById('filter-month').addEventListener('change', filterPayments);
  document.getElementById('pay-plan').addEventListener('change', updatePreview);
  document.getElementById('pay-date').addEventListener('change', updatePreview);
})();

async function loadMembers() {
  const { data } = await supabaseClient.from('members').select('id, full_name, plan_id').eq('is_active', true).order('full_name');
  return data || [];
}

async function loadPayments() {
  const { data } = await supabaseClient
    .from('payments')
    .select(`
      id, amount, payment_method, payment_date, notes,
      members(full_name),
      plans(name),
      subscriptions(start_date, end_date)
    `)
    .order('payment_date', { ascending: false })
    .limit(200);
  allPayments = data || [];
  renderPayments(allPayments);
}

function fillPaymentSelects() {
  const memSel = document.getElementById('pay-member');
  members.forEach(m => {
    memSel.innerHTML += `<option value="${m.id}" data-plan="${m.plan_id || ''}">${m.full_name}</option>`;
  });

  const planSel = document.getElementById('pay-plan');
  plans.forEach(p => {
    planSel.innerHTML += `<option value="${p.id}" data-price="${p.price}" data-days="${p.duration_days}">${p.name} — ${p.price} Bs</option>`;
  });

  // Auto-fill amount when plan changes
  document.getElementById('pay-plan').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    if (opt.dataset.price) {
      document.getElementById('pay-amount').value = opt.dataset.price;
    }
    updatePreview();
  });

  // Auto-select plan from member
  document.getElementById('pay-member').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    const planId = opt.dataset.plan;
    if (planId) {
      document.getElementById('pay-plan').value = planId;
      document.getElementById('pay-plan').dispatchEvent(new Event('change'));
    }
  });
}

function fillMonthFilter() {
  const sel = document.getElementById('filter-month');
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const now = new Date();
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    sel.innerHTML += `<option value="${val}">${months[d.getMonth()]} ${d.getFullYear()}</option>`;
  }
}

function updatePreview() {
  const planSel = document.getElementById('pay-plan');
  const dateVal = document.getElementById('pay-date').value;
  const opt = planSel.options[planSel.selectedIndex];

  if (opt && opt.dataset.days && dateVal) {
    const start = new Date(dateVal + 'T00:00:00');
    const end = new Date(start);
    end.setDate(end.getDate() + parseInt(opt.dataset.days));
    document.getElementById('prev-start').textContent = formatDate(dateVal);
    document.getElementById('prev-end').textContent = formatDate(end.toISOString().split('T')[0]);
    document.getElementById('pay-preview').style.display = 'block';
  } else {
    document.getElementById('pay-preview').style.display = 'none';
  }
}

function renderPayments(payments) {
  const tbody = document.getElementById('payments-tbody');
  if (payments.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6">
      <div class="empty-state">
        <div class="empty-state-icon">◎</div>
        <div class="empty-state-title">Sin pagos registrados</div>
        <div class="empty-state-sub">Registra el primer pago con el botón "Registrar Pago"</div>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = payments.map(p => {
    const method = p.payment_method === 'cash'
      ? '<span style="color:var(--green);font-size:12px">● Efectivo</span>'
      : '<span style="color:var(--accent);font-size:12px">● QR / Transf.</span>';

    return `
      <tr>
        <td>${formatDate(p.payment_date)}</td>
        <td class="td-name">${p.members?.full_name || '—'}</td>
        <td><span class="td-plan">${p.plans?.name || '—'}</span></td>
        <td>${method}</td>
        <td style="color:var(--accent);font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:0.04em">
          Bs ${parseFloat(p.amount).toFixed(2)}
        </td>
        <td style="font-size:12px;color:var(--text3)">
          ${p.subscriptions ? `${formatDate(p.subscriptions.start_date)} → ${formatDate(p.subscriptions.end_date)}` : '—'}
        </td>
      </tr>
    `;
  }).join('');
}

function filterPayments() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const month = document.getElementById('filter-month').value;

  let filtered = allPayments;
  if (q) filtered = filtered.filter(p => (p.members?.full_name || '').toLowerCase().includes(q));
  if (month) filtered = filtered.filter(p => p.payment_date && p.payment_date.startsWith(month));
  renderPayments(filtered);
}

function openPaymentModal(memberId = null) {
  document.getElementById('pay-member').value = memberId || '';
  if (memberId) {
    document.getElementById('pay-member').dispatchEvent(new Event('change'));
  }
  document.getElementById('pay-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('pay-notes').value = '';
  document.getElementById('pay-preview').style.display = 'none';
  document.getElementById('payment-modal').style.display = 'flex';
  updatePreview();
}

function closePaymentModal() {
  document.getElementById('payment-modal').style.display = 'none';
}

async function savePayment() {
  const memberId = document.getElementById('pay-member').value;
  const planId = document.getElementById('pay-plan').value;
  const amount = parseFloat(document.getElementById('pay-amount').value);
  const method = document.getElementById('pay-method').value;
  const date = document.getElementById('pay-date').value;
  const notes = document.getElementById('pay-notes').value.trim();

  if (!memberId) { showToast('Selecciona un socio.', 'error'); return; }
  if (!planId) { showToast('Selecciona un plan.', 'error'); return; }
  if (!amount || amount <= 0) { showToast('Ingresa un monto válido.', 'error'); return; }
  if (!date) { showToast('Selecciona una fecha.', 'error'); return; }

  const planOpt = document.getElementById('pay-plan').options[document.getElementById('pay-plan').selectedIndex];
  const durationDays = parseInt(planOpt.dataset.days) || 30;

  const startDate = date;
  const endDate = new Date(date + 'T00:00:00');
  endDate.setDate(endDate.getDate() + durationDays);
  const endDateStr = endDate.toISOString().split('T')[0];

  // Create subscription
  const { data: sub, error: subError } = await supabaseClient
    .from('subscriptions')
    .insert({ member_id: memberId, plan_id: parseInt(planId), start_date: startDate, end_date: endDateStr, status: 'active' })
    .select()
    .single();

  if (subError) { showToast('Error al crear membresía.', 'error'); return; }

  // Update member plan
  await supabaseClient.from('members').update({ plan_id: parseInt(planId) }).eq('id', memberId);

  // Register payment
  const session = await supabaseClient.auth.getSession();
  const { error: payError } = await supabaseClient.from('payments').insert({
    member_id: memberId,
    subscription_id: sub.id,
    plan_id: parseInt(planId),
    amount,
    payment_method: method,
    payment_date: date,
    notes: notes || null,
    registered_by: session.data.session?.user.id
  });

  if (payError) { showToast('Error al registrar pago.', 'error'); return; }

  await supabaseClient.rpc('update_subscription_status');
  showToast('Pago registrado. Membresía activada.');
  closePaymentModal();
  await loadPayments();
}
</script>
</body>
</html>
